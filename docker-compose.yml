services:
  tracer_jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tracer_jaeger
    ports:
      - '6831:6831/udp'
      - '16686:16686'
    networks:
      - auth_service_network
      - content_service_network

include:
  - admin_service/docker-compose.yml
  - auth_service/docker-compose.yml
  - content_service/docker-compose.yml
